<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZZetClient</title>
  <style>
    :root {
      --bg-1: #050816;
      --bg-2: #0d1530;
      --panel: rgba(15, 22, 43, 0.86);
      --line: rgba(120, 162, 255, 0.18);
      --text: #f4f7ff;
      --accent: #4d86ff;
      --accent-2: #74dcff;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(77, 134, 255, 0.28), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(116, 220, 255, 0.18), transparent 20%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      filter: blur(90px);
      pointer-events: none;
    }

    body::before {
      width: 320px;
      height: 320px;
      left: -80px;
      top: -80px;
      background: rgba(77, 134, 255, 0.28);
    }

    body::after {
      width: 280px;
      height: 280px;
      right: -70px;
      bottom: -70px;
      background: rgba(116, 220, 255, 0.18);
    }

    .card {
      width: min(640px, calc(100% - 32px));
      padding: 48px 28px;
      border: 1px solid var(--line);
      border-radius: 32px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(16px);
    }

    .name {
      margin: 0;
      font-size: clamp(2.8rem, 8vw, 5.6rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 900;
      text-transform: none;
    }

    .accent {
      display: block;
      margin-top: 10px;
      font-size: clamp(0.95rem, 2.2vw, 1.15rem);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent-2);
      opacity: 0.95;
    }

    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 34px;
      padding: 18px 30px;
      min-width: 240px;
      border-radius: 18px;
      text-decoration: none;
      color: #ffffff;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), #2f63db 58%, var(--accent-2));
      box-shadow: 0 16px 40px rgba(77, 134, 255, 0.34);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .download:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 50px rgba(77, 134, 255, 0.42);
      filter: brightness(1.04);
    }

    .download:active {
      transform: translateY(0);
    }

    @media (max-width: 520px) {
      .card {
        padding: 40px 20px;
        border-radius: 24px;
      }

      .download {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="name">ZZetClient</h1>
    <span class="accent">DDNet Client</span>
    <a class="download" href="./free.rar" download>Download</a>
  </main>
</body>
</html>
